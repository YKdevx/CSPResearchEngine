<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSP Research Engine</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <h1>🔐 CSP Research Engine</h1>
    <p class="subtitle">Live CSP Security Analysis Tool</p>

    <!-- INPUT -->
    <textarea id="search"
        placeholder="Paste CSP header here..."></textarea>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">
            <h3>Risk Score</h3>
            <div id="score" class="score">0/100</div>
        </div>

        <div class="card">
            <h3>Risk Level</h3>
            <div id="level" class="level">-</div>
        </div>

        <div class="card">
            <h3>Exposed Sources</h3>
            <div id="sources">0</div>
        </div>

    </div>

    <!-- ACTIONS -->
    <div style="margin-top: 15px;">
        <button id="exportBtn" class="export-btn">
            📤 Export Report
        </button>
    </div>

    <!-- FINDINGS -->
    <h2>⚠️ Findings</h2>
    <ul id="findings">
        <li>No analysis yet</li>
    </ul>

    <!-- MATCHES -->
    <h2>🎯 Matched Gadgets</h2>
    <ul id="matches">
        <li>No matches yet</li>
    </ul>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
